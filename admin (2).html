<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Exam Reminder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
</head>
<body>
    <nav class="navbar">
        <div class="nav-placeholder"></div>
        <h2 class="nav-title">Admin Dashboard</h2>
        
        <div class="profile-container">
            <div class="profile-icon" onclick="toggleProfile()" title="Profile">👤</div>
            <div id="profile-box" class="profile-box hidden">
                <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
                    <p style="margin: 0.5rem 0; font-size: 0.9rem;"><strong>Admin Panel</strong></p>
                    <p id="profile-email" style="color:var(--text-muted); font-size:0.85rem; word-break: break-all;">--</p>
                </div>
                <button id="logout-btn" class="btn secondary-btn" style="width: 100%; border: 1px solid var(--danger-light); color: var(--danger); background: #fff;">Logout</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-container" style="max-width: 1200px;">

        <div class="grid-2" style="margin-bottom: 3rem; align-items: stretch;">
            <!-- Image Upload Section -->
            <div class="card form-card" style="margin: 0; max-width: none;">
                <h3>Upload Timetable</h3>
                <p>Automatically parse exam schedules from images.</p>
                <form id="upload-timetable-form">
                    <div class="input-group">
                        <input type="file" id="timetable-image" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn primary-btn">Start Parsing</button>
                </form>
                <p id="upload-message" style="margin-top: 1rem; font-weight: 500; text-align: center; min-height: 1.5rem;"></p>
            </div>

            <!-- Manual Add Section -->
            <div class="card form-card" style="margin: 0; max-width: none;">
                <h3>Manual Exam Entry</h3>
                <form id="add-exam-form">
                    <div class="input-group">
                        <label>Subject</label>
                        <input type="text" id="exam-subject" required placeholder="e.g. Mathematics">
                    </div>
                    <div class="grid-2">
                        <div class="input-group">
                            <label>Date</label>
                            <input type="date" id="exam-date" required>
                        </div>
                        <div class="input-group">
                            <label>Time</label>
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="exam-time" required placeholder="09:30" pattern="(0?[1-9]|1[0-2]):[0-5][0-9]" style="flex: 2;">
                                <select id="exam-ampm" class="input-group" style="flex: 1; padding: 0.5rem; margin-bottom: 0; height: auto;">
                                    <option value="AM">AM</option>
                                    <option value="PM">PM</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="input-group">
                            <label>Branch</label>
                            <input type="text" id="exam-branch" required placeholder="e.g. CSE">
                        </div>
                        <div class="input-group">
                            <label>Section</label>
                            <input type="text" id="exam-section" required placeholder="e.g. A">
                        </div>
                    </div>
                    <button type="submit" class="btn primary-btn">Schedule Exam</button>
                </form>
            </div>
        </div>
        
        <div id="review-section" style="display: none; margin-bottom: 4rem;">
            <h3>Review Parsed Exams</h3>
            <div id="parsedExamsContainer" class="exams-grid" style="margin-top: 1.5rem;"></div>
            <button id="saveAllBtn" class="btn primary-btn" style="margin-top: 1.5rem; width: auto; padding-left: 2rem; padding-right: 2rem;">
                Save All Processed Exams
            </button>
        </div>

        <div class="exams-list">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <h2 style="margin: 0; font-size: 1.75rem;">Scheduled Exams</h2>
                <button id="delete-all-btn" class="btn" style="width: auto; background: var(--danger-light); color: var(--danger); font-size: 0.85rem; padding: 0.6rem 1.2rem; border-radius: 10px; font-weight: 700;">
                    🗑️ Delete All Exams
                </button>
            </div>
            <div id="admin-exams-container" class="exams-grid">
                <!-- Exams populated by JS -->
            </div>
        </div>

        <div id="history-section-wrapper" class="exams-list" style="display: none; margin-top: 4rem;">
            <h3 style="margin-bottom: 1.5rem;">Past Exams (History)</h3>
            <div id="admin-exams-history" class="exams-grid" style="opacity: 0.85;">
                <!-- Past exams populated by JS -->
            </div>
        </div>
    </main>
    
    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
